name: Django CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  #  1. LINT
  # ============================================================
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  # ============================================================
  #  2. SECURITY
  # ============================================================
  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install tools
        run: pip install bandit pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

      - name: Run bandit
        run: bandit -r store/ -x store/migrations --severity-level medium

  # ============================================================
  #  3. TESTS
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bougie_db
          POSTGRES_USER: bougie_user
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bougie_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DB_NAME: bougie_db
      DB_USER: bougie_user
      DB_PASSWORD: root
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U bougie_user; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate --settings=backend.settings_test

      - name: Run tests
        run: python manage.py test --settings=backend.settings_test